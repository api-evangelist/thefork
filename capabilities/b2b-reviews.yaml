naftiko: 1.0.0-alpha2
info:
  label: "TheFork B2B API \u2014 Reviews"
  description: "TheFork B2B API \u2014 Reviews. 1 operations. Lead operation: Get Review Details. Self-contained Naftiko capability covering one TheFork business surface."
  tags:
  - TheFork
  - B2B
  - Reviews
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    THEFORK_TOKEN: THEFORK_TOKEN
capability:
  consumes:
  - type: http
    namespace: b2b-reviews
    baseUri: https://api.thefork.io/manager/v1
    description: "TheFork B2B API \u2014 Reviews business capability. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.THEFORK_TOKEN}}'
    resources:
    - name: reviews-id
      path: /reviews/{id}
      operations:
      - name: getReview
        method: GET
        description: Get Review Details
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Review UUID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: b2b-reviews-rest
    port: 8080
    description: "REST adapter for TheFork B2B API \u2014 Reviews. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/reviews-id
      name: reviews
      description: REST surface for Reviews.
      operations:
      - method: GET
        name: getReview
        description: Get Review Details
        call: b2b-reviews.getReview
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: b2b-reviews-mcp
    port: 9090
    transport: http
    description: "MCP adapter for TheFork B2B API \u2014 Reviews. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: get-review
      description: Get Review Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: b2b-reviews.getReview
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
