naftiko: 1.0.0-alpha2
info:
  label: "TheFork B2B API \u2014 Customers"
  description: "TheFork B2B API \u2014 Customers. 2 operations. Lead operation: Find Customer By Phone Number. Self-contained Naftiko capability covering one TheFork business surface."
  tags:
  - TheFork
  - B2B
  - Customers
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    THEFORK_TOKEN: THEFORK_TOKEN
capability:
  consumes:
  - type: http
    namespace: b2b-customers
    baseUri: https://api.thefork.io/manager/v1
    description: "TheFork B2B API \u2014 Customers business capability. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.THEFORK_TOKEN}}'
    resources:
    - name: restaurants-id-customers-phone-phonenumber
      path: /restaurants/{id}/customers/phone/{phoneNumber}
      operations:
      - name: findCustomerByPhone
        method: GET
        description: Find Customer By Phone Number
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The restaurant identifier.
        - name: phoneNumber
          in: path
          type: string
          required: true
          description: Customer phone number in international format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers
      path: /customers
      operations:
      - name: listCustomers
        method: GET
        description: List Customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: b2b-customers-rest
    port: 8080
    description: "REST adapter for TheFork B2B API \u2014 Customers. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/restaurants-id-customers-phone-phonenumber
      name: restaurants
      description: REST surface for Customers.
      operations:
      - method: GET
        name: findCustomerByPhone
        description: Find Customer By Phone Number
        call: b2b-customers.findCustomerByPhone
        with:
          id: rest.id
          phoneNumber: rest.phoneNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers
      name: customers
      description: REST surface for Customers.
      operations:
      - method: GET
        name: listCustomers
        description: List Customers
        call: b2b-customers.listCustomers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: b2b-customers-mcp
    port: 9090
    transport: http
    description: "MCP adapter for TheFork B2B API \u2014 Customers. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: find-customerbyphone
      description: Find Customer By Phone Number
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: b2b-customers.findCustomerByPhone
      with:
        id: tools.id
        phoneNumber: tools.phoneNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: list-customers
      description: List Customers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: b2b-customers.listCustomers
      outputParameters:
      - type: object
        mapping: $.
