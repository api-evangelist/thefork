naftiko: 1.0.0-alpha2
info:
  label: "TheFork POS API \u2014 Orders"
  description: "TheFork POS API \u2014 Orders. 2 operations. Lead operation: Open Order. Self-contained Naftiko capability covering one TheFork business surface."
  tags:
  - TheFork
  - POS
  - Orders
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    THEFORK_API_KEY: THEFORK_API_KEY
capability:
  consumes:
  - type: http
    namespace: pos-orders
    baseUri: https://api.thefork.io/pos/v1
    description: "TheFork POS API \u2014 Orders business capability. Self-contained, no shared references."
    authentication:
      type: apiKey
      in: header
      name: X-Api-Key
      value: '{{env.THEFORK_API_KEY}}'
    resources:
    - name: orders
      path: /orders
      operations:
      - name: openOrder
        method: POST
        description: Open Order
        inputParameters:
        - name: CustomerId
          in: header
          type: string
          required: true
          description: The restaurant's UUID identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-orderid-close
      path: /orders/{orderId}/close
      operations:
      - name: closeOrder
        method: POST
        description: Close Order
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: TheFork's UUID for the order.
        - name: X-Api-Key
          in: header
          type: string
          required: true
          description: POS provider API key.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-orders-rest
    port: 8080
    description: "REST adapter for TheFork POS API \u2014 Orders. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for Orders.
      operations:
      - method: POST
        name: openOrder
        description: Open Order
        call: pos-orders.openOrder
        with:
          CustomerId: rest.CustomerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders-orderid-close
      name: orders
      description: REST surface for Orders.
      operations:
      - method: POST
        name: closeOrder
        description: Close Order
        call: pos-orders.closeOrder
        with:
          orderId: rest.orderId
          X-Api-Key: rest.X-Api-Key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-orders-mcp
    port: 9090
    transport: http
    description: "MCP adapter for TheFork POS API \u2014 Orders. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: open-order
      description: Open Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-orders.openOrder
      with:
        CustomerId: tools.CustomerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: close-order
      description: Close Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-orders.closeOrder
      with:
        orderId: tools.orderId
        X-Api-Key: tools.X-Api-Key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
