naftiko: 1.0.0-alpha2
info:
  label: "TheFork B2B API \u2014 Reservations"
  description: "TheFork B2B API \u2014 Reservations. 3 operations. Lead operation: Create Reservation. Self-contained Naftiko capability covering one TheFork business surface."
  tags:
  - TheFork
  - B2B
  - Reservations
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    THEFORK_TOKEN: THEFORK_TOKEN
capability:
  consumes:
  - type: http
    namespace: b2b-reservations
    baseUri: https://api.thefork.io/manager/v1
    description: "TheFork B2B API \u2014 Reservations business capability. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.THEFORK_TOKEN}}'
    resources:
    - name: restaurants-id-reservations
      path: /restaurants/{id}/reservations
      operations:
      - name: createReservation
        method: POST
        description: Create Reservation
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The restaurant identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reservations-id
      path: /reservations/{id}
      operations:
      - name: getReservation
        method: GET
        description: Get Reservation
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The reservation identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reservations-id
      path: /reservations/{id}
      operations:
      - name: updateReservation
        method: PATCH
        description: Update Reservation
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The reservation identifier.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: b2b-reservations-rest
    port: 8080
    description: "REST adapter for TheFork B2B API \u2014 Reservations. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/restaurants-id-reservations
      name: restaurants
      description: REST surface for Reservations.
      operations:
      - method: POST
        name: createReservation
        description: Create Reservation
        call: b2b-reservations.createReservation
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reservations-id
      name: reservations
      description: REST surface for Reservations.
      operations:
      - method: GET
        name: getReservation
        description: Get Reservation
        call: b2b-reservations.getReservation
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reservations-id
      name: reservations
      description: REST surface for Reservations.
      operations:
      - method: PATCH
        name: updateReservation
        description: Update Reservation
        call: b2b-reservations.updateReservation
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: b2b-reservations-mcp
    port: 9090
    transport: http
    description: "MCP adapter for TheFork B2B API \u2014 Reservations. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: create-reservation
      description: Create Reservation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: b2b-reservations.createReservation
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-reservation
      description: Get Reservation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: b2b-reservations.getReservation
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-reservation
      description: Update Reservation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: b2b-reservations.updateReservation
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
