aid: thefork
name: TheFork
description: >-
  TheFork is a leading European restaurant reservations marketplace, part of
  Tripadvisor, connecting diners with tens of thousands of restaurants across
  Europe and beyond. Through its developers portal, TheFork exposes a public
  REST API surface for restaurants, point-of-sale systems, and third-party
  partners to integrate with TheFork Management platform. The API enables
  partners to build custom booking flows, create and manage reservations with
  full detail such as meal date, party size, and customer data, surface preset
  menus and curated dining experiences, and access personalized guest data
  including allergies, dietary restrictions, and seating preferences. Offerings
  include a B2B API for restaurants and a POS API for point-of-sale providers.
type: Index
