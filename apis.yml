apis:
  - aid: thefork:rest-api
    name: TheFork B2B API
    description: >-
      TheFork B2B API lets restaurants and groups integrate with TheFork
      Management platform. It supports designing custom booking flows, creating
      reservations with meal date, party size, and customer data, presenting
      preset menus, and accessing personalized guest data such as allergies,
      dietary restrictions, and seating preferences. Authentication uses an API
      key and bearer token.
    humanURL: https://docs.thefork.io/B2B-API/introduction
    tags:
      - Reservations
      - Booking
      - Menus
      - Guests
    properties:
      - type: Documentation
        url: https://docs.thefork.io/B2B-API/introduction
      - type: GettingStarted
        url: https://docs.thefork.io/getting-started
  - aid: thefork:pos-api
    name: TheFork POS API
    description: >-
      TheFork POS API enables point-of-sale providers to integrate their
      systems with TheFork Management platform, synchronizing reservations and
      restaurant operations data. The API documentation describes how the
      integration works for POS partners and the resources available for
      connecting POS systems to TheFork.
    humanURL: https://docs.thefork.io/POS-API/how-it-works
    tags:
      - Point Of Sale
      - Reservations
    properties:
      - type: Documentation
        url: https://docs.thefork.io/POS-API/how-it-works
      - type: GettingStarted
        url: https://docs.thefork.io/getting-started
